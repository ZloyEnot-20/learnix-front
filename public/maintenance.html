<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Maintenance — Learnix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 4rem 1.5rem;
      text-align: center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
    }

    .bg-glow {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(200, 16, 46, 0.08), transparent 55%);
    }

    .code {
      pointer-events: none;
      user-select: none;
      position: relative;
      z-index: 0;
      font-size: 9rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(to bottom, #e2e8f0, #f1f5f9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -2.5rem;
    }

    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4rem;
      height: 4rem;
      margin-bottom: 1.25rem;
      border-radius: 1rem;
      background-color: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
    }

    .icon svg {
      width: 1.75rem;
      height: 1.75rem;
    }

    h1 {
      max-width: 28rem;
      font-size: 1.875rem;
      font-weight: 700;
      line-height: 1.2;
      color: #0f172a;
    }

    p {
      margin-top: 0.75rem;
      max-width: 28rem;
      font-size: 1rem;
      line-height: 1.6;
      color: #64748b;
    }

    @media (min-width: 640px) {
      .code { font-size: 12rem; }
      .content { margin-top: -4rem; }
      h1 { font-size: 1.875rem; }
    }
  </style>
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <span class="code" aria-hidden="true">502</span>

  <div class="content">
    <div class="icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>

    <h1>We'll be back soon</h1>
    <p>Maintenance work is underway. Some services may be temporarily unavailable.</p>
  </div>
</body>
</html>
